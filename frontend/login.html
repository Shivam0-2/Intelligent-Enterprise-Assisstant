<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enterprise Assistant — Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-page">

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="login-card">

    <div class="login-logo">
      <div class="logo-icon">✦</div>
      <span>Enterprise Assistant</span>
    </div>

    <div>
      <h2>Welcome back</h2>
      
      <p class="subtitle">Sign in with your work email to continue.</p>
    </div>

    <div class="field">
      <label for="email">Work email</label>
      <input type="email" id="email" placeholder="you@company.com" />
    </div>

    <div class="field">
      <label>One-time password</label>
      <div class="otp-row">
        <input type="text" id="otp" placeholder="Enter OTP" />
        <button class="btn" id="otp-btn" onclick="requestOTP()">Send OTP</button>
      </div>
    </div>

    <div id="login-status" class="status-bar"></div>

    <button class="btn btn-accent" onclick="verifyOTP()">Sign in</button>

    <p class="login-footer">OTP expires in 10 minutes after sending.</p>

  </div>

  <script>
    const API = "https://enterprise-assisstant-production.up.railway.app";

    // Redirect if already logged in
    window.onload = () => {
      if (localStorage.getItem("token")) {
        const role = localStorage.getItem("role");
        window.location.href = role === "admin" ? "admin.html" : "index.html";
      }
    };

    function setStatus(msg, type) {
      const el = document.getElementById("login-status");
      el.textContent = msg;
      el.className   = `status-bar show ${type}`;
    }

    async function requestOTP() {
      const email = document.getElementById("email").value.trim();
      if (!email) { setStatus("Please enter your email first.", "err"); return; }

      const btn = document.getElementById("otp-btn");
      btn.disabled = true;
      setStatus("Sending OTP...", "inf");

      try {
        const res = await fetch(`${API}/auth/request-otp`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });

        const data = await res.json();
        if (res.ok) {setStatus("OTP sent — check your inbox.", "ok");} 
        else { setStatus(data.detail || "Failed to send OTP.", "err");}
      }
      catch {
        setStatus("Server unreachable.", "err");
      } finally {
        btn.disabled = false;
      }
    }

    async function verifyOTP() {
      const email = document.getElementById("email").value.trim();
      const otp   = document.getElementById("otp").value.trim();
      if (!email || !otp) { setStatus("Enter both email and OTP.", "err"); return; }

      setStatus("Verifying...", "inf");

      try {
        const res = await fetch(`${API}/auth/verify-otp`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, otp })
        });

        const data = await res.json();
        if (!res.ok) { setStatus(data.detail ?? "Invalid OTP.", "err"); return; }

        localStorage.setItem("token", data.access_token);
        localStorage.setItem("role",  data.role);

        window.location.href = data.role === "admin" ? "admin.html" : "index.html";

      } catch {
        setStatus("Server unreachable.", "err");
      }
    }
  </script>

</body>
</html>
